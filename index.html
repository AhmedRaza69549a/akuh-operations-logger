<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outreach Labs Complaint Logger</title>
    <style>
        :root {
            --medical-red: #8b0000;
            --light-bg: #f9f9f9;
            --border-color: #d3d3d3;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            border-top: 6px solid var(--medical-red);
        }
        h2 {
            color: var(--medical-red);
            text-align: center;
            margin-bottom: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        label.required::after {
            content: " *";
            color: red;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        button {
            background-color: var(--medical-red);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }
        button:hover {
            background-color: #660000;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>AKUH Complaint Logger</h2>
    <form id="complaintForm">
        <div class="form-grid">
            <div>
                <label class="required">Complaint ID</label>
                <input type="text" id="complaintId" required>
            </div>
            <div>
                <label class="required">Outreach Lab</label>
                <select id="outreachLab" required>
                    <option value="">Select Lab...</option>
                    <option value="CMS">CMS</option>
                    <option value="Kharadar">Kharadar</option>
                    <option value="Garden">Garden</option>
                    <option value="Karimabad">Karimabad</option>
                    <option value="Hyderabad">Hyderabad</option>
                    <option value="AKMCC Hyderabad">AKMCC Hyderabad</option>
                    <option value="Sukkur">Sukkur</option>
                    <option value="Multan">Multan</option>
                    <option value="Lahore">Lahore</option>
                    <option value="Faisalabad">Faisalabad</option>
                    <option value="Rawalpindi">Rawalpindi</option>
                    <option value="Peshawar">Peshawar</option>
                    <option value="Quetta">Quetta</option>
                    </select>
            </div>
            <div>
                <label class="required">Complaint Logged By</label>
                <input type="text" id="loggedBy" required>
            </div>
            <div>
                <label class="required">Date & Timestamp</label>
                <input type="datetime-local" id="timestamp" required>
            </div>
            <div>
                <label>Asset Tag #</label>
                <input type="text" id="assetTag">
            </div>
            <div>
                <label>Item</label>
                <input type="text" id="item">
            </div>
            <div class="full-width">
                <label class="required">Complaint Detail</label>
                <textarea id="detail" required></textarea>
            </div>
            <div>
                <label class="required">Department</label>
                <select id="department" required>
                    <option value="">Select...</option>
                    <option value="IT Offsite Support">IT Offsite Support</option>
                    <option value="IT Service Desk">IT Service Desk</option>
                    <option value="IT HIS Team">IT HIS Team</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="MEP">MEP</option>
                    <option value="BME">BME</option>
                    <option value="Powerplant">Powerplant</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Housekeeping">Housekeeping</option>
                    <option value="Sysmex (Vendor)">Sysmex (Vendor)</option>
                    <option value="Roche (Vendor)">Roche (Vendor)</option>
                    <option value="Advia">Advia</option>
                    <option value="Transport">Transport</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div>
                <label class="required">Current Status</label>
                <select id="status" required>
                    <option value="Open">Open</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Escalated">Escalated</option>
                    <option value="Resolved">Resolved</option>
                </select>
            </div>
            <div>
                <label>Priority Level</label>
                <select id="priority">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>
            <div>
                <label>Follow-up Dates</label>
                <input type="text" id="followUp">
            </div>
            <div>
                <label>Date Resolved</label>
                <input type="date" id="dateResolved">
            </div>
            <div class="full-width">
                <label>Remarks (If Any)</label>
                <input type="text" id="remarks">
            </div>
            <div class="full-width">
                <label>Manager's Remarks</label>
                <input type="text" id="managerRemarks">
            </div>
        </div>
        <button type="submit">Submit Complaint</button>
        <div id="statusMessage" class="message"></div>
    </form>
</div>

<script>
    // REPLACE THIS URL WITH YOUR NEW GOOGLE APPS SCRIPT WEB APP URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx8T7gPspgS4mhhlHzdkeLRPHBVtwzoHc24Tz-i-XGleR48ZH0pLdw_fKr8YVYNZuN3aw/exec'; 

    const form = document.getElementById('complaintForm');
    const statusMessage = document.getElementById('statusMessage');

    form.addEventListener('submit', e => {
        e.preventDefault();
        statusMessage.textContent = "Submitting...";
        statusMessage.style.color = "#333";

        const formData = {
            complaintId: document.getElementById('complaintId').value,
            outreachLab: document.getElementById('outreachLab').value,
            loggedBy: document.getElementById('loggedBy').value,
            timestamp: document.getElementById('timestamp').value.replace('T', ' '),
            assetTag: document.getElementById('assetTag').value,
            item: document.getElementById('item').value,
            detail: document.getElementById('detail').value,
            department: document.getElementById('department').value,
            followUp: document.getElementById('followUp').value,
            status: document.getElementById('status').value,
            priority: document.getElementById('priority').value,
            dateResolved: document.getElementById('dateResolved').value,
            remarks: document.getElementById('remarks').value,
            managerRemarks: document.getElementById('managerRemarks').value
        };

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(formData),
            headers: {
                'Content-Type': 'text/plain;charset=utf-8',
            }
        })
        .then(response => {
            statusMessage.textContent = "Complaint logged successfully!";
            statusMessage.style.color = "green";
            form.reset();
            setTimeout(() => { statusMessage.textContent = ""; }, 3000);
        })
        .catch(error => {
            console.error('Error!', error.message);
            statusMessage.textContent = "Submission failed. Check connection.";
            statusMessage.style.color = "red";
        });
    });
</script>

</body>
</html>
